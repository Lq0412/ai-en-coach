name: xe3-speakup-portal

services:
  portal:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: xe3-speakup-portal
    restart: unless-stopped
    init: true
    environment:
      PORTAL_ADMIN_PASSWORD: ${PORTAL_ADMIN_PASSWORD:?请设置管理看板密码}
      PORTAL_SQLITE_PATH: /app/.wrangler/portal.sqlite
    ports:
      - "127.0.0.1:18082:3000"
    volumes:
      - portal_data:/app/.wrangler

volumes:
  portal_data:
    name: xe3-speakup-portal-data
