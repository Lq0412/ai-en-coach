server {
    listen 80;
    listen [::]:80;
    server_name speak-up.top www.speak-up.top;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/xe3-speakup-portal/certbot/www;
        default_type text/plain;
    }

    location / {
        return 301 https://speak-up.top$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.speak-up.top;

    ssl_certificate /opt/xe3-speakup-portal/certbot/conf/live/speak-up.top/fullchain.pem;
    ssl_certificate_key /opt/xe3-speakup-portal/certbot/conf/live/speak-up.top/privkey.pem;

    return 301 https://speak-up.top$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name speak-up.top;

    ssl_certificate /opt/xe3-speakup-portal/certbot/conf/live/speak-up.top/fullchain.pem;
    ssl_certificate_key /opt/xe3-speakup-portal/certbot/conf/live/speak-up.top/privkey.pem;

    access_log logs/xe3-speakup-portal.access.log;
    error_log logs/xe3-speakup-portal.error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /pages {
        return 404;
    }

    location ^~ /pages/ {
        return 404;
    }

    location = /tests {
        return 404;
    }

    location ^~ /tests/ {
        return 404;
    }

    location = /WISPR-FLOW-DESIGN-preview.html {
        return 404;
    }

    location = /WISPR-FLOW-DESIGN.md {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
