server {
    listen 80;
    listen [::]:80;
    server_name speak-up.top www.speak-up.top;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/xe3-speakup-portal/certbot/www;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 503;
    }
}
