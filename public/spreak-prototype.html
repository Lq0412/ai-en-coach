x}.talk{width:92px;height:92px;border-radius:50%;border:0;background:#262828;color:#fff;font-weight:700;cursor:pointer}.talk.recording{background:var(--green);color:#071109;animation:pulse 1.1s infinite}@keyframes pulse{50%{box-shadow:0 0 0 13px rgba(53,223,75,.12)}}.transcript{background:#182019;border:1px solid #2b5a31;border-radius:16px;padding:15px;text-align:left;color:#d9ffdc;margin:4px 0 18px}.tip-box{background:#2a2516;border:1px solid #5d5124;border-radius:16px;padding:14px;color:#ffe897;text-align:left}.report-hero{background:linear-gradient(140deg,#164818,#17321a);border-radius:22px;padding:19px;margin:15px 0}.report-hero h3{margin:0 0 8px}.metric-row{display:flex;gap:10px}.metric{flex:1;background:#1d1f1f;border-radius:16px;padding:14px}.metric small{color:var(--muted)}.metric b{display:block;margin-top:6px;font-size:19px}.status{display:inline-flex;background:#52240d;color:#ffb087;border-radius:999px;padding:5px 9px;font-size:11px}.accent-title{border-left:5px solid var(--green);padding-left:11px}.optimized{color:var(--green);font-size:17px;line-height:1.55}.role-progress{height:5px;background:#292b2b;border-radius:999px;overflow:hidden;margin:8px 0 36px}.role-progress i{display:block;width:58%;height:100%;background:#aaa}.question-card{border:1px solid #363838;border-radius:18px;padding:20px;line-height:1.55;font-size:18px}.question-card small{display:block;color:#777b77;margin-top:12px}.role-input{margin-top:auto;display:grid;grid-template-columns:54px 1fr;gap:10px}.text-send{display:flex;background:#252727;border-radius:18px;padding:6px 8px 6px 16px}.text-send input{flex:1;background:transparent;border:0;color:#fff;outline:none;min-width:0}.text-send button{border:0;background:transparent;font-size:24px}.role-preview{text-align:center}.role-preview .special-face{margin:36px auto 18px;width:120px;height:110px;background:var(--yellow);border-radius:40% 60% 48% 52%;display:grid;place-items:center;color:#151515;font-size:24px;font-weight:800}.role-preview .bio{text-align:left;color:#b8bbb8;line-height:1.75}.profile-card{background:#1d1f1f;border-radius:24px;padding:22px;margin:18px 0}.profile-top{text-align:center}.profile-top .avatar{width:88px;height:88px;border-radius:34px;font-size:36px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#333;border-radius:20px;overflow:hidden;margin:20px 0}.stat{background:#1d1f1f;padding:18px;text-align:center}.stat strong{display:block;font-size:28px;margin-top:7px}.settings-row{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:0;border-bottom:1px solid #303232;padding:18px 0;cursor:pointer}.toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;background:#f5f5f3;color:#111;border-radius:999px;padding:11px 18px;font-size:13px;box-shadow:0 8px 30px #000;white-space:nowrap}.hidden{display:none!important}
