<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Spreak 产品原型</title>
  <style>
    :root{--bg:#0d0e0e;--panel:#1b1d1d;--panel2:#252727;--line:#343636;--text:#f5f6f4;--muted:#8d918d;--green:#35df4b;--green2:#b8ff8a;--yellow:#ffd74c;--orange:#ff7646;--red:#ff5d5d;--radius:28px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#070808;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button{color:inherit}.app-shell{min-height:100vh;display:grid;grid-template-columns:270px minmax(390px,460px);gap:38px;justify-content:center;align-items:start;padding:30px}.prototype-nav{position:sticky;top:30px;padding:24px 20px;border:1px solid #202222;border-radius:26px;background:#101111}.brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.brand-mark{width:46px;height:46px;border-radius:15px;background:var(--green);display:grid;place-items:center;color:#081109;font-weight:900;font-size:24px}.brand h1{margin:0;font-size:20px}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.nav-group{margin:20px 8px 8px;color:#666b67;font-size:11px;letter-spacing:.12em}.route-btn{width:100%;border:0;background:transparent;border-radius:13px;padding:11px 12px;text-align:left;color:#aeb2ae;cursor:pointer;display:flex;align-items:center;gap:10px}.route-btn:hover,.route-btn.active{background:#202222;color:#fff}.route-btn.active::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green)}.hint{margin:18px 8px 0;padding-top:16px;border-top:1px solid #252727;color:#666b67;font-size:12px;line-height:1.6}.phone{position:relative;width:100%;height:min(850px,calc(100vh - 60px));min-height:720px;background:var(--bg);border:1px solid #262828;border-radius:48px;box-shadow:0 30px 80px rgba(0,0,0,.55);overflow:hidden}.statusbar{height:52px;padding:18px 27px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;position:absolute;top:0;left:0;right:0;z-index:30;pointer-events:none}.screen{height:100%;overflow-y:auto;scrollbar-width:none;padding:66px 24px 34px}.screen::-webkit-scrollbar{display:none}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.topbar h2{font-size:23px;margin:0}.icon-btn,.round-btn{border:1px solid var(--line);background:#171919;display:grid;place-items:center;cursor:pointer}.icon-btn{width:42px;height:42px;border-radius:14px;font-size:19px}.round-btn{width:54px;height:54px;border-radius:50%;font-size:19px}.ghost-icon{background:transparent;border:0;font-size:28px;padding:4px;cursor:pointer}.chip{display:inline-flex;align-items:center;gap:7px;background:#232525;border-radius:999px;padding:8px 12px;font-size:12px}.chip.yellow{background:var(--yellow);color:#15170e;font-weight:700}.hero-title{font-size:29px;line-height:1.18;margin:14px 0 20px}.home-head{display:flex;justify-content:space-between;align-items:center}.avatar{border:0;background:var(--green);width:45px;height:45px;border-radius:15px 15px 18px 18px;font-size:22px;cursor:pointer}.hero-card{position:relative;background:linear-gradient(145deg,#fbffd3 4%,#d8ffbd 44%,#72ef82);color:#10130f;padding:22px;border-radius:30px;min-height:260px;margin:24px 0 28px;overflow:hidden}.hero-card h3{font-size:25px;margin:142px 0 3px}.hero-card p{margin:0;font-size:13px}.hero-card .primary-dark{position:absolute;right:18px;bottom:20px}.characters{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:210px;height:125px}.blob{position:absolute;width:84px;height:84px;border:7px solid #161816;border-radius:43% 57% 50% 50%;display:grid;place-items:center;font-weight:800;font-size:20px;box-shadow:0 10px 0 rgba(0,0,0,.18)}.blob::after{content:"•ᴗ•"}.blob.one{left:5px;top:12px;background:#ffc533;transform:rotate(-8deg)}.blob.two{right:2px;top:20px;background:#ff815f;transform:rotate(7deg)}.blob.three{left:64px;top:42px;background:#71eb99;z-index:2}.primary,.primary-dark,.secondary,.danger{border:0;border-radius:18px;padding:14px 19px;font-weight:700;cursor:pointer}.primary{background:var(--green);color:#071109}.primary:hover{filter:brightness(1.08)}.primary-dark{background:#101210;color:#fff}.secondary{background:#242626;border:1px solid #3a3d3a;color:#fff}.danger{background:#331b16;color:#ff8a63;border:1px solid #6c3324}.btn-wide{width:100%;padding:16px}.section-title{font-size:21px;margin:28px 0 14px}.menu-card{display:flex;align-items:center;gap:14px;width:100%;padding:18px;border:1px solid #2f3131;background:#1a1c1c;border-radius:20px;margin:11px 0;text-align:left;cursor:pointer}.menu-card .emoji{width:42px;height:42px;border-radius:14px;background:#2a2c2c;display:grid;place-items:center;font-size:21px}.menu-card .copy{flex:1}.menu-card strong{display:block;font-size:17px}.menu-card small{display:block;color:var(--muted);margin-top:4px}.sheet{position:absolute;z-index:50;inset:0;background:rgba(0,0,0,.66);display:flex;align-items:flex-end}.sheet-card{width:100%;background:#141616;border-radius:34px 34px 0 0;padding:27px 24px 36px;animation:rise .25s ease}.sheet-card h2{margin:0 0 16px}@keyframes rise{from{transform:translateY(30px);opacity:0}}.steps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:18px 0 40px}.step{text-align:center;color:#595d59;font-size:11px;position:relative}.step::after{content:"";height:2px;background:#343634;position:absolute;top:13px;left:66%;width:70%}.step:last-child::after{display:none}.step b{width:28px;height:28px;border-radius:50%;border:2px solid #444;display:grid;place-items:center;margin:0 auto 7px;font-size:12px}.step.active{color:#fff}.step.active b,.step.done b{background:#f5f5f3;color:#111;border-color:#f5f5f3}.field-label{display:block;color:#a9ada9;font-size:13px;margin:18px 0 8px}.field,.select{width:100%;border:1px solid #353737;background:#202222;color:#f2f3f2;border-radius:16px;padding:15px;outline:none}.field:focus,.select:focus{border-color:var(--green)}textarea.field{min-height:120px;resize:none}.summary-card,.report-card{background:#1d1f1f;border:1px solid #303232;border-radius:20px;padding:18px;margin:12px 0}.summary-card h3,.report-card h3{margin:0 0 9px}.summary-card p,.report-card p{color:#b8bbb8;line-height:1.62;margin:6px 0;font-size:14px}.sticky-actions{display:grid;grid-template-columns:1fr 1.5fr;gap:10px;margin-top:26px}.interviewer{display:grid;grid-template-columns:56px 1fr auto;gap:13px;align-items:center;background:#202222;border-radius:20px;padding:15px;margin:11px 0}.face{width:56px;height:56px;border-radius:50%;background:#717371;display:grid;place-items:center;color:#111;font-weight:900}.face.green{background:var(--green)}.face.yellow{background:var(--yellow)}.interviewer h3{margin:0;font-size:16px}.interviewer p{margin:4px 0 0;color:var(--muted);font-size:12px}.round-card{background:#202222;border-radius:28px;min-height:500px;padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center}.round-card .face{width:90px;height:90px;margin-top:80px;font-size:21px}.round-card h2{font-size:30px;margin:20px 0 4px}.round-card p{color:var(--muted)}.round-actions{margin-top:auto;width:100%;display:grid;gap:10px}.progress-dots{text-align:center;color:#505350;letter-spacing:8px;margin-top:16px}.progress-dots b{color:#fff}.practice{display:flex;flex-direction:column;min-height:calc(100% - 10px);text-align:center}.practice-head{display:flex;justify-content:space-between;align-items:center;text-align:left}.practice h1{font-size:21px}.practice-person{margin:50px auto 20px}.practice-person .face{width:112px;height:112px;margin:auto;font-size:25px}.practice-person h2{margin:16px 0 2px}.practice-person p{color:var(--muted);margin:0}.audio{display:flex;align-items:center;gap:13px;background:#232525;border-radius:16px;padding:16px;margin:30px auto;width:88%;text-align:left}.wave{flex:1;height:26px;background:repeating-linear-gradient(90deg,#aeb2ae 0 3px,transparent 3px 8px);clip-path:polygon(0 40%,5% 20%,10% 50%,15% 5%,20% 65%,25% 30%,30% 70%,35% 15%,40% 55%,45% 25%,50% 80%,55% 5%,60% 60%,65% 20%,70% 75%,75% 35%,80% 65%,85% 12%,90% 50%,95% 30%,100% 55%,100% 70%,0 70%)}.practice-controls{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:30px}.talk{width:92px;height:92px;border-radius:50%;border:0;background:#262828;color:#fff;font-weight:700;cursor:pointer}.talk.recording{background:var(--green);color:#071109;animation:pulse 1.1s infinite}@keyframes pulse{50%{box-shadow:0 0 0 13px rgba(53,223,75,.12)}}.transcript{background:#182019;border:1px solid #2b5a31;border-radius:16px;padding:15px;text-align:left;color:#d9ffdc;margin:4px 0 18px}.tip-box{background:#2a2516;border:1px solid #5d5124;border-radius:16px;padding:14px;color:#ffe897;text-align:left}.report-hero{background:linear-gradient(140deg,#164818,#17321a);border-radius:22px;padding:19px;margin:15px 0}.report-hero h3{margin:0 0 8px}.metric-row{display:flex;gap:10px}.metric{flex:1;background:#1d1f1f;border-radius:16px;padding:14px}.metric small{color:var(--muted)}.metric b{display:block;margin-top:6px;font-size:19px}.status{display:inline-flex;background:#52240d;color:#ffb087;border-radius:999px;padding:5px 9px;font-size:11px}.accent-title{border-left:5px solid var(--green);padding-left:11px}.optimized{color:var(--green);font-size:17px;line-height:1.55}.role-progress{height:5px;background:#292b2b;border-radius:999px;overflow:hidden;margin:8px 0 36px}.role-progress i{display:block;width:58%;height:100%;background:#aaa}.question-card{border:1px solid #363838;border-radius:18px;padding:20px;line-height:1.55;font-size:18px}.question-card small{display:block;color:#777b77;margin-top:12px}.role-input{margin-top:auto;display:grid;grid-template-columns:54px 1fr;gap:10px}.text-send{display:flex;background:#252727;border-radius:18px;padding:6px 8px 6px 16px}.text-send input{flex:1;background:transparent;border:0;color:#fff;outline:none;min-width:0}.text-send button{border:0;background:transparent;font-size:24px}.role-preview{text-align:center}.role-preview .special-face{margin:36px auto 18px;width:120px;height:110px;background:var(--yellow);border-radius:40% 60% 48% 52%;display:grid;place-items:center;color:#151515;font-size:24px;font-weight:800}.role-preview .bio{text-align:left;color:#b8bbb8;line-height:1.75}.profile-card{background:#1d1f1f;border-radius:24px;padding:22px;margin:18px 0}.profile-top{text-align:center}.profile-top .avatar{width:88px;height:88px;border-radius:34px;font-size:36px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#333;border-radius:20px;overflow:hidden;margin:20px 0}.stat{background:#1d1f1f;padding:18px;text-align:center}.stat strong{display:block;font-size:28px;margin-top:7px}.settings-row{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:0;border-bottom:1px solid #303232;padding:18px 0;cursor:pointer}.toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;background:#f5f5f3;color:#111;border-radius:999px;padding:11px 18px;font-size:13px;box-shadow:0 8px 30px #000;white-space:nowrap}.hidden{display:none!important}
    @media(max-width:780px){.app-shell{display:block;padding:0}.prototype-nav{display:none}.phone{height:100vh;min-height:100vh;border:0;border-radius:0;max-width:none}.screen{padding-bottom:30px}}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="prototype-nav">
      <div class="brand"><div class="brand-mark">S</div><div><h1>Spreak</h1><p>交互产品原型 · v1</p></div></div>
      <div class="nav-group">核心流程</div>
      <button class="route-btn active" data-route="home">首页</button>
      <button class="route-btn" data-route="create-job">创建模拟面试</button>
      <button class="route-btn" data-route="interviewers">确认面试官</button>
      <button class="route-btn" data-route="rounds">面试轮次</button>
      <button class="route-btn" data-route="practice">语音练习</button>
      <button class="route-btn" data-route="report">练习报告</button>
      <button class="route-btn" data-route="sentence">逐句改进</button>
      <div class="nav-group">场景与账户</div>
      <button class="route-btn" data-route="role-create">创建角色</button>
      <button class="route-btn" data-route="role-preview">角色预览</button>
      <button class="route-btn" data-route="profile">个人中心</button>
      <button class="route-btn" data-route="settings">设置</button>
      <p class="hint">点击左侧可快速切页；也可以直接在手机界面中完成整条流程。</p>
    </aside>
    <section class="phone" aria-label="Spreak 手机原型">
      <div class="statusbar"><span>12:08</span><span>▮▮▮ 4G　▰</span></div>
      <div class="screen" id="screen"></div>
      <div class="toast hidden" id="toast"></div>
    </section>
  </div>
  <script>
    const state={route:'home',quick:false,recording:false,answered:false,goal:0,roleAnswer:''};
    const S=document.getElementById('screen');
    const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const top=(title,back='home',right='')=>`<div class="topbar"><button class="ghost-icon" data-route="${back}" aria-label="返回">‹</button><h2>${title}</h2>${right||'<span style="width:38px"></span>'}</div>`;
    const steps=n=>`<div class="steps">${['输入职位','生成方案','确认面试官'].map((x,i)=>`<div class="step ${i+1===n?'active':''} ${i+1<n?'done':''}"><b>${i+1<n?'✓':i+1}</b>${x}</div>`).join('')}</div>`;
    function home(){return `<div class="home-head"><button class="avatar" data-route="profile" aria-label="个人中心">;)</button><span class="chip yellow">⏰ 新手福利</span><button class="icon-btn" data-action="quick" aria-label="开始新练习">＋</button></div><h1 class="hero-title">今天，练一次<br>真正用得上的英语</h1><section class="hero-card"><div class="characters"><i class="blob one"></i><i class="blob two"></i><i class="blob three"></i></div><h3>模拟面试</h3><p>多轮面试 · 个性报告</p><button class="primary-dark" data-route="create-job">开始面试</button></section><h2 class="section-title">我的练习</h2><button class="menu-card" data-route="rounds"><span class="emoji">✦</span><span class="copy"><strong>全流程面试</strong><small>Spreak 产品经理 · 4 个轮次</small></span><span>›</span></button><button class="menu-card" data-route="role-create"><span class="emoji">💼</span><span class="copy"><strong>职场商务对话</strong><small>创建适合工作的角色和场景</small></span><span>›</span></button><button class="menu-card" data-action="quick"><span class="emoji">＋</span><span class="copy"><strong>开始一个新练习</strong><small>面试、生活或自定义角色</small></span><span>›</span></button>${state.quick?quickSheet():''}`}
    function quickSheet(){return `<div class="sheet" data-action="close-sheet"><div class="sheet-card" onclick="event.stopPropagation()"><div class="topbar"><h2>开始一个练习</h2><button class="ghost-icon" data-action="close-sheet">×</button></div><button class="menu-card" data-route="create-job"><span class="emoji">🎤</span><span class="copy"><strong>模拟面试</strong><small>多轮面试，个性报告</small></span><span>开始</span></button><button class="menu-card" data-route="role-create"><span class="emoji">💼</span><span class="copy"><strong>职场商务对话</strong></span><span>创建</span></button><button class="menu-card" data-route="role-create"><span class="emoji">☀️</span><span class="copy"><strong>日常生活对话</strong></span><span>创建</span></button><button class="menu-card" data-route="role-create"><span class="emoji">✿</span><span class="copy"><strong>创建一个角色</strong></span><span>创建</span></button></div></div>`}
    function createJob(){return `${top('创建一个模拟面试')}${steps(1)}<h1 class="hero-title">您要面试什么职位？</h1><label class="field-label" for="job">用一句话告诉我目标职位</label><textarea class="field" id="job" placeholder="例如：我要面试 Spreak 产品经理">我要面试 Spreak 产品经理</textarea><div style="height:120px"></div><button class="primary btn-wide" data-route="create-plan">开始生成方案</button>`}
    function createPlan(){return `${top('创建一个模拟面试','create-job')}${steps(2)}<h2>职位</h2><div class="summary-card"><small>职位名称</small><h3>Spreak 产品经理</h3><p>负责产品整体规划与迭代，结合用户需求、业务目标与市场趋势明确产品方向。</p></div><div style="display:flex;align-items:center;justify-content:space-between"><h2>我的简历</h2><button class="ghost-icon" data-action="toast" data-message="原型：已选择简历文件">⇧</button></div><div class="summary-card"><small>优势亮点</small><p>4 年互联网产品经验，熟悉用户研究、原型设计、数据复盘与跨团队协作。</p></div><label class="field-label">想重点练什么范围</label><input class="field" value="自我介绍、产品判断、终面">
      <label class="field-label">补充要求</label><input class="field" placeholder="例如：重点追问项目取舍">
      <div class="sticky-actions"><button class="secondary" data-route="create-job">返回</button><button class="primary" data-route="interviewers">生成面试官</button></div>`}
    function interviewers(){const people=[['Mia','HR 经理','green'],['Ethan','产品总监',''],['Lena','首席产品官','yellow'],['Noah','工程经理','']];return `${top('确认面试官','create-plan','<span class="chip">步骤 3/3</span>')}${steps(3)}<p style="color:var(--muted)">AI 已根据职位与简历生成 4 轮面试。点击任意角色可编辑。</p>${people.map((p,i)=>`<button class="interviewer" data-action="toast" data-message="${p[0]} 的角色设置已打开"><span class="face ${p[2]}">•ᴗ•</span><span style="text-align:left"><h3>${p[0]}</h3><p>${p[1]} · ${['轻松友好','追问深入','高层视角','协作判断'][i]}</p></span><span>›</span></button>`).join('')}<button class="secondary btn-wide" data-action="toast" data-message="已添加一个面试官">＋ 添加面试官</button><div class="sticky-actions"><button class="secondary" data-route="create-plan">返回</button><button class="primary" data-route="rounds">创建模拟面试</button></div>`}
    function rounds(){return `${top('全流程面试','home','<button class="icon-btn" data-action="toast" data-message="职位、简历与面试目标">ⓘ</button>')}<div class="metric-row"><div class="metric"><small>对话</small><b>0 分钟</b></div><div class="metric"><small>获得</small><b>★ 0</b></div></div><div style="height:14px"></div><section class="round-card"><span class="chip" style="align-self:flex-start">产品判断深挖　★ 0/4</span><div class="face">•ᴗ•</div><h2>产品总监</h2><p>Ethan</p><div class="round-actions"><button class="primary btn-wide" data-route="practice">▶ 开始练习</button><button class="secondary btn-wide" data-action="toast" data-message="已打开准备话术">✦ 准备话术</button></div></section><div class="progress-dots">• <b>•</b> • •</div>`}
    function practice(){return `<div class="practice"><div class="practice-head"><button class="ghost-icon" data-route="rounds">‹</button><h1>产品判断深挖</h1><button class="chip" data-action="practice-menu">★ ${state.goal}/4　⋮</button></div><div class="practice-person"><div class="face">•ᴗ•</div><h2>Ethan</h2><p>产品总监</p></div><div class="audio"><span>▶</span><span class="wave"></span><b>1.0x</b></div>${state.answered?`<div class="transcript"><b>你的回答</b><br>The project that best shows my ownership was a creator backend revamp...</div>`:''}<div class="practice-controls"><button class="round-btn" data-action="toast" data-message="已切换文字/语音模式">⇄</button><button class="talk ${state.recording?'recording':''}" data-action="record">${state.recording?'点击发送':'点击说话'}</button><button class="round-btn" data-action="tip">Tip</button></div></div>`}
    function report(){return `${top('面试报告','rounds')}<h1 class="hero-title">面试报告 <small style="font-size:14px">2026.07.13</small></h1><div class="metric-row"><div class="metric"><small>面试用时</small><b>4 分钟</b></div><div class="metric"><small>目标完成</small><b>★ 2/4</b></div></div><div class="report-hero"><h3>总结</h3><p>你已经能清晰描述项目背景。下一次重点补充关键取舍、数据结果与个人贡献。</p></div><div class="report-card"><h3 class="accent-title">情境达成分析</h3><p>回答进入了项目语境，但项目开场较慢。建议先用一句话说明项目、用户和核心结果。</p></div><div class="report-card"><h3 class="accent-title">目标完成情况</h3><span class="status">目标未完成</span><p><b>解释取舍</b><br>你提到了决策，但还需要说明为什么没有选择另一条方案。</p><span class="status">目标已完成</span><p><b>展示数据</b><br>留存率提升 18% 的结果表达清楚。</p></div><div class="report-card"><h3 class="accent-title">语言表现</h3><p><b>流利度</b>　停顿集中在项目结果部分</p><p><b>词汇</b>　target group → target users</p><p><b>语法</b>　时态基本准确</p></div><button class="primary btn-wide" data-route="sentence">练习最需要改进的句子</button><button class="secondary btn-wide" style="margin-top:10px" data-route="practice">再练一次</button>`}
    function sentence(){return `${top('1 个句子可以优化','report')}<div class="summary-card"><p style="color:var(--orange);font-size:18px">Hello Jimmy way, can you give me some more tips on target group</p><p>你好，Jimmy，能再给我一些关于目标用户群的建议吗？</p></div><div class="report-card"><h3 class="accent-title">为什么需要优化</h3><p>称呼与句子连接不自然，target group 在此处更适合表达为 target users。</p></div><div class="report-card"><h3 class="accent-title">优化表达</h3><p class="optimized">Hi Jimmy, could you share a few more tips on how to approach our target users?</p><p>表达更自然，也更符合职场请教语境。</p></div><div class="report-card"><h3>逐词发音</h3><p>Hi　 Jimmy　 could　 you　 share　 target　 users</p></div><button class="primary btn-wide" data-action="toast" data-message="跟读录音已开始">🎙 跟读这个句子</button>`}
    function roleCreate(){return `${top('创建一个角色','home')}<div class="role-progress"><i></i></div><div style="display:flex;flex-direction:column;min-height:620px"><div class="question-card">很好，是一位当地饭店老板。你希望这个人是什么样的呢？比如热情、幽默、冷静，或者很健谈？<small>Great, a local restaurant owner. How would you like this person to be?</small></div><div style="flex:1"></div><div class="role-input"><button class="round-btn" data-action="toast" data-message="已切换到语音输入">⇄</button><div class="text-send"><input id="role-answer" value="幽默、热情，像一位熟悉当地生活的朋友"><button data-route="role-generating">➤</button></div></div></div>`}
    function roleGenerating(){return `${top('正在创建角色','role-create')}<h1 class="hero-title">正在生成角色设定…</h1><p style="color:var(--muted)">大约需要 3 分钟，退出不会中断创建过程。</p><div class="summary-card"><p>✓ 整理人物背景</p><p>✓ 构建表达策略</p><p>••• 搭建练习单元</p><p>••• 生成个性话术</p></div><div style="height:280px"></div><button class="primary btn-wide" data-route="role-preview">原型中立即完成</button>`}
    function rolePreview(){return `${top('角色已创建','home')}<div class="role-preview"><div class="special-face">•ᴗ•</div><h1>Marlowe</h1><p class="chip">当地小餐馆老板</p><p class="bio">Marlowe 是一位幽默风趣的本地餐馆老板，生活在热闹的海边旅游小镇。他善于把简单的点餐过程变成轻松有趣的聊天，也喜欢推荐当地菜、隐秘小街和安静海滩。他只会说英语，并会自然地把对话集中在食物、旅行和本地生活上。</p><button class="primary btn-wide" data-route="role-chat">开始聊天</button></div>`}
    function roleChat(){return `<div class="practice"><div class="practice-head"><button class="ghost-icon" data-route="role-preview">‹</button><h1>和 Marlowe 聊天</h1><button class="icon-btn" data-action="toast" data-message="角色详情">⋮</button></div><div class="practice-person"><div class="special-face" style="width:100px;height:92px;margin:auto;background:var(--yellow);border-radius:43%;display:grid;place-items:center;color:#111;font-size:22px">•ᴗ•</div><h2>Marlowe</h2><p>in his restaurant.</p></div><div class="audio"><span>▶</span><span class="wave"></span><b>1.0x</b></div><div class="tip-box">Welcome in! Are you looking for something local, or do you feel adventurous today?</div><div class="practice-controls"><button class="round-btn">⇄</button><button class="talk" data-action="record">点击说话</button><button class="round-btn" data-action="tip">Tip</button></div></div>`}
    function profile(){return `${top('个人中心','home')}<div class="profile-top"><button class="avatar">;)</button><h1>未设置昵称</h1><span class="chip yellow">会员 · 明日到期</span></div><div class="stats"><div class="stat"><small>总共对话</small><strong>4 分钟</strong></div><div class="stat"><small>获得</small><strong>★ 2</strong></div></div><div class="profile-card"><button class="settings-row" data-action="toast" data-message="权益中心"><span>权益中心</span><span>查看权益　›</span></button><button class="settings-row" data-action="toast" data-message="订单列表"><span>我的订单</span><span>›</span></button></div><div class="profile-card"><button class="settings-row" data-action="toast" data-message="训练目标"><span>Target</span><span>›</span></button><button class="settings-row" data-action="toast" data-message="客服入口"><span>联系客服</span><span>›</span></button><button class="settings-row" data-route="settings"><span>设置</span><span>›</span></button></div>`}
    function settings(){return `${top('设置','profile')}<div class="profile-card"><button class="settings-row"><span>头像</span><span class="avatar" style="width:40px;height:40px;border-radius:14px">;)</span></button><button class="settings-row" data-action="toast" data-message="昵称编辑"><span>昵称</span><span>未设置　›</span></button><div class="settings-row"><span>手机号</span><span>189****5572</span></div></div><div class="profile-card"><button class="settings-row" data-action="toast" data-message="音色：亲切女声（英式）"><span>音色选择</span><span>亲切女声　›</span></button><button class="settings-row"><span>隐私政策</span><span>›</span></button><button class="settings-row"><span>服务条款</span><span>›</span></button><button class="settings-row"><span>关于 Spreak</span><span>›</span></button></div><button class="secondary btn-wide" data-action="toast" data-message="原型不会真正退出">退出登录</button><button class="danger btn-wide" style="margin-top:10px" data-action="toast" data-message="原型不会注销账号">注销账号</button>`}
    const views={'home':home,'create-job':createJob,'create-plan':createPlan,'interviewers':interviewers,'rounds':rounds,'practice':practice,'report':report,'sentence':sentence,'role-create':roleCreate,'role-generating':roleGenerating,'role-preview':rolePreview,'role-chat':roleChat,'profile':profile,'settings':settings};
    function render(){S.innerHTML=(views[state.route]||home)();S.scrollTop=0;document.querySelectorAll('.route-btn').forEach(b=>b.classList.toggle('active',b.dataset.route===state.route))}
    function go(route){state.route=route;state.quick=false;render()}
    function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.add('hidden'),1800)}
    document.addEventListener('click',e=>{const el=e.target.closest('[data-route],[data-action]');if(!el)return;if(el.dataset.route){go(el.dataset.route);return}const a=el.dataset.action;if(a==='quick'){state.quick=true;render()}else if(a==='close-sheet'){state.quick=false;render()}else if(a==='toast'){toast(el.dataset.message||'已完成')}else if(a==='record'){if(!state.recording){state.recording=true;render();toast('正在录音…')}else{state.recording=false;state.answered=true;state.goal=Math.min(4,state.goal+1);render();toast('回答已发送')}}else if(a==='tip'){toast('提示：先用一句话说清项目、用户和结果')}else if(a==='practice-menu'){go('report')}});
    render();
  </script>
</body>
</html>
